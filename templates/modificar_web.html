<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Modificar Web</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Actualizar Pagina Web - Servidor {{ vmid }}</h3>
            </div>
            <div class="card-body">
                <form action="{{ url_for('modificar_web') }}" method="POST" enctype="multipart/form-data">
                    <input type="hidden" name="vmid" value="{{ vmid }}">
                    
                    <div class="alert alert-info">
                        Sube un nuevo archivo <strong>index.html</strong>. Este reemplazara al actual y reiniciara el servicio Apache2 automaticamente.
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold">Nuevo archivo HTML</label>
                        <input type="file" name="fichero_html" class="form-control" accept=".html" required>
                    </div>
                    
                    <button type="submit" class="btn btn-success" onclick="this.disabled=true; this.form.submit();">Actualizar Web</button>
                    <a href="{{ url_for('gestion_servicio') }}" class="btn btn-secondary ms-2">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
