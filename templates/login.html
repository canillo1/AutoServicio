<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - AutoServicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/estilos.css') }}" rel="stylesheet">
</head>
<body class="pantalla-centrada">
    <main class="contenedor-acceso">
        <div class="card shadow-sm caja-formulario border-primary">
            <div class="card-body p-4">
                <h2 class="text-center mb-3 text-primary">AutoServicio</h2>
                <p class="text-muted text-center mb-4">Elige la opcion que quieras</p>
                <form action="/login" method="POST">
                    <div class="mb-3">
                        <label for="usuario" class="form-label etiqueta-negrita">Usuario</label>
                        <input type="text" name="username" class="form-control" id="usuario" placeholder="Ej: admin" required>
                    </div>
                    <div class="mb-4">
                        <label for="contrasena" class="form-label etiqueta-negrita">Contrasenia</label>
                        <input type="password" name="password" class="form-control" id="contrasena" placeholder="Tu clave de acceso" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 boton-principal mb-3">
                        Entrar al Sistema
                    </button>
                    <div class="text-center mt-3">
                        <a href="/registro" class="text-decoration-none small text-muted">¿No tienes cuenta? Registrate aqui</a>
                    </div>
                    
                </form>
            </div>
        </div>
    </main>

</body>
</html>
