<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AutoServicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{url_for('static', filename='css/estilos.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark shadow-sm">
        <div class="container-fluid px-4">
            <span class="navbar-brand mb-0 h1 d-flex align-items-center">
                  Usuario: <strong class="ms-2 text-info">{{ nombre_usuario }}</strong>
            </span>
            <a href="/login" class="btn btn-outline-light btn-sm">Cerrar Sesion</a>
        </div>
    </nav>
    <div class="container mt-5">
        <div class="row text-center mb-5">
            <div class="col-12">
                <h1 class="display-5 fw-bold">Panel de Control</h1>
                <p class="lead text-muted">Elige una opcion</p>
            </div>
        </div>
        <div class="row justify-content-center g-4">
            <div class="col-md-5">
                <div class="card h-100 shadow-sm border-primary encima_cuadros">
                    <div class="card-body py-5 text-center">
                        <h2 class="card-title text-primary mb-3">Crear Servicio</h2>
                        <a href="/crear_servicio" class="btn btn-primary btn-lg w-100">Iniciar Despliegue</a>
                    </div>
                </div>
            </div>  
            <div class="col-md-5">
                <div class="card h-100 shadow-sm border-success encima_cuadros">
                    <div class="card-body py-5 text-center">
                        <h2 class="card-title text-success mb-3">Gestionar Servicios</h2>
                        <a href="/gestionar_servicios" class="btn btn-success btn-lg w-100">Ver mi Infraestructura</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
